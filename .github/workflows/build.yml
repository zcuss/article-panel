name: Build & Publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build
        env:
          # CI build only — secrets overridden at runtime via .env on VPS
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'ci-placeholder' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-placeholder-32-chars-padding-x' }}
        run: npm run build

      - name: Prepare runtime bundle
        run: |
          set -e
          rm -rf runtime
          mkdir -p runtime
          # Standalone output (includes its own node_modules + server.js)
          if [ -f .next/standalone/server.js ]; then
            echo "Using standalone build"
            cp -r .next/standalone/. runtime/
            mkdir -p runtime/.next/standalone/.next
            cp -r .next/static runtime/.next/standalone/.next/static
            mkdir -p runtime/.next/standalone/public
            cp -r public/. runtime/.next/standalone/public/
          else
            echo "Standalone server.js not found, falling back to full source"
            ls -la .next/ 2>&1 | head
            ls -la .next/standalone/ 2>&1 | head
            cp -r .next runtime/.next
            cp -r public runtime/public
            cp package.json runtime/
            cp package-lock.json runtime/
          fi
          # package.json + next config for ops convenience
          cp package.json runtime/
          cp next.config.js runtime/ 2>/dev/null || true
          # Env template (so VPS can `cp .env.example .env`)
          cp .env.example runtime/ 2>/dev/null || true
          # VPS installer scripts (one-liner install + update)
          mkdir -p runtime/scripts
          cp scripts/setup-vps.sh runtime/scripts/
          cp scripts/update.sh runtime/scripts/
          cp scripts/uninstall.sh runtime/scripts/
          chmod +x runtime/scripts/*.sh
          # Startup helper
          cat > runtime/start.sh <<'EOF'
          #!/usr/bin/env bash
          set -e
          cd "$(dirname "$0")"
          export PORT="${PORT:-3000}"
          export HOSTNAME="${HOSTNAME:-127.0.0.1}"
          if [ -f .next/standalone/server.js ]; then
            exec node .next/standalone/server.js
          else
            echo "Installing deps (no standalone)..."
            npm ci --omit=dev --no-audit --no-fund
            exec npx next start -p "${PORT}" -H "${HOSTNAME}"
          fi
          EOF
          chmod +x runtime/start.sh
          # Source README (install instructions) replaces heredoc default
          cp README.md runtime/README.md 2>/dev/null || true
          # Sanity: must exist or service 502s
          if [ -f runtime/.next/standalone/server.js ]; then
            test -d runtime/.next/standalone/.next/static || { echo "MISSING .next/static"; exit 1; }
            test -d runtime/.next/standalone/public || { echo "MISSING public"; exit 1; }
          else
            echo "WARN: no standalone server.js, will fall back to next start"
          fi
          echo "Runtime bundle size:"
          du -sh runtime
          find runtime -type f | wc -l
          echo "Files OK."

      - name: Publish to build branch
        env:
          BRANCH: build
        run: |
          set -e
          # actions/checkout already set GITHUB_TOKEN credentials in ~/.gitconfig.
          # Switch the SAME repo to an orphan branch and replace its contents.
          git checkout --orphan "$BRANCH"
          # Wipe working tree (keep .git and runtime)
          find . -maxdepth 1 -mindepth 1 ! -name '.git' ! -name 'runtime' -exec rm -rf {} +
          # Move runtime bundle into the branch root
          cp -r runtime/. .
          rm -rf runtime
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "build: ${GITHUB_SHA::7}" || echo "Nothing to commit"
          git push -f origin "HEAD:${BRANCH}"
          echo "✅ Pushed to ${BRANCH}"
