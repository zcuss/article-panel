name: Build & Publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build
        env:
          # CI build only — secrets overridden at runtime via .env on VPS
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'ci-placeholder' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-placeholder-32-chars-padding-x' }}
        run: npm run build

      - name: Prepare runtime bundle
        run: |
          set -e
          rm -rf runtime
          mkdir -p runtime
          # Standalone output (includes its own node_modules + server.js)
          cp -r .next/standalone/. runtime/
          # Static assets Next.js may reference from outside standalone
          mkdir -p runtime/.next
          cp -r .next/static runtime/.next/static 2>/dev/null || true
          # Public dir (will hold generated sites/* at runtime, but include folder)
          mkdir -p runtime/public
          cp -r public/. runtime/public/
          # package.json + next config for ops convenience
          cp package.json runtime/
          cp next.config.js runtime/ 2>/dev/null || true
          # Startup helper
          cat > runtime/start.sh <<'EOF'
          #!/usr/bin/env bash
          set -e
          cd "$(dirname "$0")"
          export PORT="${PORT:-3000}"
          export HOSTNAME="${HOSTNAME:-127.0.0.1}"
          exec node .next/standalone/server.js
          EOF
          chmod +x runtime/start.sh
          cat > runtime/README.md <<'EOF'
          # article-panel (runtime)
          Prebuilt Next.js app. No `npm install`, no `npm run build` required.

          ## Run
          ```bash
          ./start.sh                 # default: 127.0.0.1:3000
          PORT=3001 ./start.sh       # custom port
          ```

          ## Config
          Create a `.env` file alongside `start.sh`:
          ```
          ADMIN_PASSWORD=your-strong-password
          JWT_SECRET=32-char-random-secret
          AI_BASE_URL=https://api.openai.com/v1
          AI_API_KEY=sk-xxx
          AI_MODEL=gpt-4o-mini
          SITES_DIR=./public/sites
          NGINX_SITES_DIR=./nginx/sites
          NGINX_INCLUDE_PATH=/etc/nginx/sites-enabled/articles.conf
          NGINX_RELOAD_CMD=sudo /usr/sbin/nginx -s reload
          ```

          ## Layout
          - `.next/standalone/` — Node server + bundled deps
          - `.next/static/` — client/static assets
          - `public/sites/<domain>/index.html` — generated articles (runtime)
          - `data/app.db` — SQLite database (auto-created)
          EOF
          echo "Runtime bundle size:"
          du -sh runtime
          find runtime -type f | wc -l
          echo "Files OK."

      - name: Publish to build branch
        env:
          BRANCH: build
        run: |
          set -e
          cd runtime
          git init -q
          git checkout -q -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # use a temporary credential helper that injects GITHUB_TOKEN
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --local credential.helper ""
          git config --local credential.helper '!f() { echo "Authorization: Bearer ${GITHUB_TOKEN}"; }; f'
          # workaround: write netrc for cleanest auth
          printf 'machine github.com\nlogin x-access-token\npassword %s\n' "$GITHUB_TOKEN" > ~/.netrc
          chmod 600 ~/.netrc
          git add -A
          git commit -q -m "build: ${GITHUB_SHA::7}" || echo "Nothing to commit"
          git push -f origin "HEAD:${BRANCH}"
          rm -f ~/.netrc
          echo "✅ Pushed to ${BRANCH}"
